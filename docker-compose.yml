version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: supplyguard-app
    container_name: supplyguard-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=supplyguard
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: supplyguard-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: supplyguard
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
